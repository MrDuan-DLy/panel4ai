name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'panel4ai ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads
            Grab the installer for your platform from the assets below.

            ### macOS — first-launch note (unsigned build)
            This build is ad-hoc signed only (no Apple Developer ID). macOS blocks downloads from the internet with a quarantine flag, which shows **"panel4ai.app is damaged"** or **"unidentified developer"**.

            After installing into `/Applications`, run this once in Terminal to remove the quarantine flag:

            ```
            xattr -dr com.apple.quarantine /Applications/panel4ai.app
            ```

            Then open the app normally. This is a one-time step per install.

            ### Windows
            Run the `.msi` or `.exe` installer. You may need to click "More info" → "Run anyway" on SmartScreen the first time.
          releaseDraft: false
          prerelease: false
